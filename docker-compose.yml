services:

  app:
    build: .
    container_name: hello-app
    restart: unless-stopped
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    container_name: hello-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
